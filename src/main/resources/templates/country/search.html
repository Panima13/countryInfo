<html xmlns:th="http://www.thymeleaf.org">


<div th:fragment="body">



	<style>
div {
	background-color: transparent;
}

.input {
	width: 400px;
	height: 50px;
	background-color: lightgray;
	padding: 10px;
	border: 1px solid gray;
	box-sizing: border-box;
}

.submit {
	width: 100px;
	height: 50px;
	background-color: rgb(200, 60, 60);
	border: 1px solid gray;
	padding: 10px;
	box-sizing: border-box;
}

.submit:hover {
	background-color: rgb(255, 40, 40);
	cursor: pointer;
}

.countryBox {
background-color:white;
	padding: 20px;
	border-radius: 5px;
	box-shadow: 5px 5px 10px gray;
	margin: 20px;
}
</style>

	<div class="result">

		<form method="GET" action="">
			<input class="input" type="text"
				placeholder="Enter a Country name or part of it" name="searchtext">
			<input class="submit" type="submit" value="find">

		</form>


		<div th:if="${#lists.isEmpty(countryInfoList) and showResult}">
			<div>
				<h1>Country not matched</h1>
			</div>
		</div>
		<h1>result(s):</h1>
		<hr>
		<div class="countryBox" th:each="countryinfo :${countryInfoList}">

			<h1 th:text="${countryinfo['names']['official']}"></h1>

			<div class="container" th:if="${#maps.isEmpty(countryinfo)}">
				<div>Country not found</div>
			</div>
			<div class="container" th:if="${!#maps.isEmpty(countryinfo)}">

				<div class="countryname">
					<img width="400" th:src="${countryinfo['flag']['url_png']}"
						alt="flag" />
					<table>
						<tr>
							<td>Name:</td>
							<td th:text="${countryinfo['names']['common']}"></td>
						</tr>

						<tr>
							<td>Official Name:</td>
							<td th:text="${countryinfo['names']['official']}"></td>
						</tr>

						<tr th:each="nativename : ${countryinfo['names']['native']}">
							<td>Native Name:</td>
							<td th:text="${nativename.value['common']}"></td>
						</tr>

						<tr th:each="nativename : ${countryinfo['names']['native']}">
							<td>Native Official Name:</td>
							<td th:text="${nativename.value['official']}"></td>
						</tr>

						<tr>
							<td>Alpha2:</td>
							<td th:text="${countryinfo['codes']['alpha_2']}"></td>
						</tr>

						<tr>
							<td>Alpha3:</td>
							<td th:text="${countryinfo['codes']['alpha_3']}"></td>
						</tr>

						<tr>
							<td>Capital:</td>
							<td th:text="${countryinfo['capitals'][0]['name']}"></td>
						</tr>

						<th:block th:each="lang : ${countryinfo['languages']}">
							<tr>
								<td>Language Name:</td>
								<td th:text="${lang['name']}"></td>
							</tr>
							<tr>
								<td>Native Language Name:</td>
								<td th:text="${lang['native_name']}"></td>
							</tr>
						</th:block>
						<tr>
							<td>Population:</td>
							<td
								th:text="${#numbers.formatInteger(countryinfo['population'], 3, 'COMMA')}"></td>
						</tr>
					</table>
				</div>




				<ul>

					<li th:each="link : ${countryinfo['links']}"><a
						th:href="${link.value}" th:text="${link.key}">></a></li>

				</ul>






				<!-- <div th:text="${countryinfo}"></div> -->


			</div>

		</div>
	</div>
</div>

</html>

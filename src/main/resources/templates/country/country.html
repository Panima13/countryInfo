	<h1>Country Project</h1>

	<div class="container" th:if ="${#maps.isEmpty(countryinfo)}"}>
		<div>Country not found</div>
		</div>
		<div class="container" th:if ="${!#maps.isEmpty(countryinfo)}">

			<div class="countryname">
				<img width="400" th:src="${countryinfo['flag']['url_png']}"
					alt="flag" />
				<table>
					<tr>
						<td>Name:</td>
						<td th:text="${countryinfo['names']['common']}"></td>
					</tr>

					<tr>
						<td>Official Name:</td>
						<td th:text="${countryinfo['names']['official']}"></td>
					</tr>

					<tr th:each="nativename : ${countryinfo['names']['native']}">
						<td>Native Name:</td>
						<td th:text="${nativename.value['common']}"></td>
					</tr>

					<tr th:each="nativename : ${countryinfo['names']['native']}">
						<td>Native Official Name:</td>
						<td th:text="${nativename.value['official']}"></td>
					</tr>

					<tr>
						<td>Alpha2:</td>
						<td th:text="${countryinfo['codes']['alpha_2']}"></td>
					</tr>

					<tr>
						<td>Alpha3:</td>
						<td th:text="${countryinfo['codes']['alpha_3']}"></td>
					</tr>

					<tr>
						<td>Capital:</td>
						<td th:text="${countryinfo['capitals'][0]['name']}"></td>
					</tr>

					<th:block th:each="lang : ${countryinfo['languages']}">
						<tr>
							<td>Language Name:</td>
							<td th:text="${lang['name']}"></td>
						</tr>
						<tr>
							<td>Native Language Name:</td>
							<td th:text="${lang['native_name']}"></td>
						</tr>
					</th:block>
					<tr>
						<td>Population:</td>
						<td
							th:text="${#numbers.formatInteger(countryinfo['population'], 3, 'COMMA')}"></td>
					</tr>
				</table>
			</div>




			<ul>

				<li th:each="link : ${countryinfo['links']}"><a
					th:href="${link.value}" th:text="${link.key}">></a></li>

			</ul>






			<!-- <div th:text="${countryinfo}"></div> -->


		</div>
